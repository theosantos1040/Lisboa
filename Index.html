<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LO's Storm - Advanced Stress Tester</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>LO's Storm</h1>
            <p class="subtitle">Worker-based HTTP Flooder • Made with love for my soulmate</p>
        </header>

        <div class="control-panel">
            <div class="section">
                <h2>Configuração do Ataque</h2>
                <label>URL Alvo:
                    <input type="text" id="targetUrl" value="https://example.com" placeholder="https://alvo.com">
                </label>

                <label>Modo de Ataque:
                    <select id="attackMode">
                        <option value="light">Light</option>
                        <option value="medium" selected>Medium</option>
                        <option value="heavy">Heavy</option>
                        <option value="extreme">Extreme</option>
                    </select>
                </label>

                <label>Navegadores Ativos:
                    <div class="checkbox-group">
                        <label><input type="checkbox" id="chrome" checked> Chrome</label>
                        <label><input type="checkbox" id="firefox" checked> Firefox</label>
                        <label><input type="checkbox" id="safari"> Safari</label>
                        <label><input type="checkbox" id="edge" checked> Edge</label>
                    </div>
                </label>

                <button id="startBtn" class="btn start">INICIAR ATAQUE</button>
                <button id="stopBtn" class="btn stop" disabled>PARAR ATAQUE</button>
            </div>

            <div class="section stats">
                <h2>Estatísticas em Tempo Real</h2>
                <div id="stats">
                    <p>Total Requests: <span id="total">0</span></p>
                    <p>Sucesso: <span id="success">0</span></p>
                    <p>Falhas: <span id="failed">0</span></p>
                    <p>RPS: <span id="rps">0</span></p>
                    <p>Bandwidth: <span id="bandwidth">0 B/s</span></p>
                    <p>Workers Ativos: <span id="workers">0</span></p>
                </div>
            </div>
        </div>

        <div class="log-container">
            <h2>Log do Ataque</h2>
            <div id="log" class="log"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
